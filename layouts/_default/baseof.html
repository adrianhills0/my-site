<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ if .Title }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
  <link rel="stylesheet" href="{{ "style.css" | relURL }}">
</head>
<body>
  <header>
    <h1><a href="{{ "" | relURL }}">{{ .Site.Title }}</a></h1>
    <nav>
      <a href="{{ "" | relURL }}">Home</a>
      <a href="{{ "posts/" | relURL }}">Posts</a>
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <p>Built with Hugo.</p>
  </footer>
</body>
</html>
